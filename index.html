<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snarky Jesus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .card { background: #fff; border-radius: 16px; border: 0.5px solid #e0dfd8; padding: 2.5rem 2rem; max-width: 560px; width: 100%; }
    .header { text-align: center; margin-bottom: 2rem; }
    .icon img { width: 120px; height: 150px; object-fit: cover; object-position: top; border-radius: 12px; margin-bottom: 10px; }
    h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #888; }
    label { font-size: 14px; color: #666; display: block; margin-bottom: 8px; }
    textarea { width: 100%; min-height: 100px; font-size: 15px; padding: 12px; border: 0.5px solid #ddd; border-radius: 10px; resize: vertical; font-family: inherit; color: #1a1a1a; background: #fafafa; outline: none; transition: border-color 0.15s; }
    textarea:focus { border-color: #7F77DD; background: #fff; }
    button { margin-top: 12px; width: 100%; padding: 13px; font-size: 15px; font-weight: 600; background: #3C3489; color: #EEEDFE; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.15s; }
    button:hover:not(:disabled) { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .response { margin-top: 1.5rem; background: #faf9ff; border: 0.5px solid #c8c4f0; border-radius: 12px; padding: 1.25rem 1.5rem; display: none; }
    .response.visible { display: block; }
    .response-label { font-size: 11px; font-weight: 600; color: #534AB7; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .response-text { font-size: 15px; color: #1a1a1a; line-height: 1.75; white-space: pre-wrap; }
    .error { color: #c0392b; font-size: 14px; margin-top: 10px; display: none; }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon"><img src="/jesus.jpg" alt="Sacred Heart of Jesus by Pompeo Batoni" /></div>
      <h1>Snarky Jesus</h1>
      <p class="sub">Bring your problems. Expect no sympathy.</p>
    </div>

    <label for="problem">What's your problem? (He already knows, but go ahead.)</label>
    <textarea id="problem" placeholder="e.g. I feel like nobody appreciates me and my life is falling apart..."></textarea>
    <button id="btn" onclick="askJesus()">Seek Guidance ✝</button>

    <p class="error" id="error"></p>

    <div class="response" id="response">
      <div class="response-label">⚡ Tough Love Jesus says:</div>
      <div class="response-text" id="response-text"></div>
    </div>
  </div>

  <script>
    async function askJesus() {
      const problem = document.getElementById('problem').value.trim();
      if (!problem) return;

      const btn = document.getElementById('btn');
      const error = document.getElementById('error');
      const response = document.getElementById('response');
      const responseText = document.getElementById('response-text');

      btn.disabled = true;
      btn.textContent = 'He is reading your message and sighing heavily...';
      error.classList.remove('visible');
      response.classList.remove('visible');

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        responseText.textContent = data.response;
        response.classList.add('visible');
      } catch (e) {
        error.textContent = 'Something went sideways. Even Jesus needs a moment. Try again.';
        error.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Seek Guidance ✝';
      }
    }

    document.getElementById('problem').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) askJesus();
    });
  </script>
</body>
</html>
